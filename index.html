<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CDDC: Agencia Principium.cima</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Impact', sans-serif; touch-action: none; }
        #game-container { position: relative; width: 1000px; height: 500px; border: 4px solid gold; background: #000; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; }
        .screen { position: absolute; inset: 0; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: gold; text-align: center; padding: 20px; }
        .char-grid { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center; max-width: 900px; }
        .char-card { border: 2px solid #444; padding: 6px; cursor: pointer; background: #000; width: 110px; border-radius: 8px; transition: 0.2s; }
        .char-card:hover { border-color: gold; transform: scale(1.05); }
        .char-card img { width: 85px; height: 85px; object-fit: cover; border-radius: 4px; border: 1px solid #333; }
        .sign-tag { font-size: 0.85em; color: #fff; margin-top: 5px; }
        #narrative-screen { background: #000; color: #eee; font-family: 'Special Elite', serif; display: none; }
        .typewriter { overflow: hidden; white-space: pre-wrap; margin: 0 auto; letter-spacing: .10em; max-width: 750px; font-size: 1.2em; text-align: left; }
        .hud { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid gold; visibility: hidden; }
        .hud-img { width: 50px; height: 50px; border: 1px solid gold; object-fit: cover; }
        .hp-bar-bg { width: 180px; height: 12px; background: #400; border: 1px solid #fff; }
        .hp-bar-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.3s; }
        /* WIDGET CLIMA INTEGRADO */
        #weather-report { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 8px; border: 1px solid #00ffff; border-radius: 5px; color: #00ffff; font-family: 'Special Elite'; font-size: 10px; z-index: 200; pointer-events: none; visibility: hidden;}
                
        button { background: gold; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2em; text-transform: uppercase; box-shadow: 0 4px 0 #b8860b; }
        button:hover { background: #fff; }
        .cbu-box { margin-top: 20px; display: none; flex-direction: column; align-items: center; gap: 10px; }
        .cbu-input { background: #111; border: 2px solid gold; color: lime; padding: 10px; font-family: 'Special Elite'; font-size: 1.2em; text-align: center; width: 300px; outline: none; }
        .cbu-input::placeholder { color: #444; }

        /* CONTROLES MOBILE */
        #mobile-ui {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;
            display: none; pointer-events: none; z-index: 150;
        }
        #joystick-base {
            position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%; pointer-events: auto;
        }
        #joystick-stick {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: rgba(255, 215, 0, 0.4); border: 2px solid gold;
            border-radius: 50%;
        }
        .m-atk-btn {
            position: absolute; bottom: 45px; right: 40px; width: 70px; height: 70px;
            background: rgba(255, 0, 0, 0.2); border: 2px solid red;
            border-radius: 50%; color: white; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: bold;
            pointer-events: auto; touch-action: none;
        }
        @media (max-width: 1024px) { #mobile-ui { display: block; } }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div id="weather-report">
        <div style="color:gold; font-size: 8px; border-bottom: 1px solid #333;">PRONÓSTICO AGENCIA CIMA-PRINCIPIUM</div>
        <div id="weather-data">CARGANDO...</div>
    </div>
}
    <div id="intro-screen" class="screen">
        <h1 style="font-size: 3.5em; margin: 0; color: gold; text-shadow: 4px 4px #000;">CIMA DE DUROS CAMPEONES</h1>
        <p style="color: #fff; letter-spacing: 2px;">AGENCIA PRINCIPIUM.CIMA</p>
        <button onclick="showSelect()">IRAN AL BARRIO</button>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <h2 style="font-size: 2em; margin-bottom: 10px;">ELIJE TU GUERRERO</h2>
        <div class="char-grid" id="grid-container"></div>
    </div>

    <div id="narrative-screen" class="screen">
        <div class="typewriter" id="narrative-text"></div>
        <button id="btn-narrative" style="display:none;" onclick="startGame()">EMPEZAR EL DÍA</button>
    </div>

    <div id="victory-screen" class="screen" style="display:none; background: rgba(0,0,0,0.95);">
        <h2 id="victory-title" style="font-size: 3em; color: gold;">¡BARRIO DOMINADO!</h2>
        <p style="font-size: 1.5em; color: #fff;">RECAUDACIÓN: <span id="final-score" style="color: gold;">$0</span></p>
        <p id="victory-msg" style="max-width: 650px; color: #ccc; line-height: 1.6;"></p>
        
        <div id="cbu-container" class="cbu-box">
            <label style="font-family: 'Special Elite'; color: gold;">INGRESE CBU PARA COBRO:</label>
            <input type="text" id="cbu-field" class="cbu-input" placeholder="0000000000000000000000" maxlength="22">
        </div>

        <button id="btn-victory" onclick="nextStep()">AVANZAR</button>
    </div>

    <div id="hud" class="hud">
        <img id="hud-face" class="hud-img" src="">
        <div>
            <div id="hud-name" style="color: gold; font-size: 1.1em;">-</div>
            <div class="hp-bar-bg"><div id="hp-fill" class="hp-bar-fill"></div></div>
            <div style="color:#fff; font-size: 0.8em;">RECAUDADO: <span id="score-text" style="color:gold">$0</span></div>
        </div>
    </div>

    <!-- UI MOBILE ADICIONAL -->
    <div id="mobile-ui">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div class="m-atk-btn" id="mAtk">GOLPE</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const imgDo = new Image(); imgDo.src = 'do.jpg';
const imgFa = new Image(); imgFa.src = 'fa.jpg';
const imgRe = new Image(); imgRe.src = 're.jpg';
const imgSol = new Image(); imgSol.src = 'sol.jpg';
const flyers = [imgFa, imgDo, imgRe];
const bgMusic = new Audio('tipo.mp3'); bgMusic.loop = true;

let active = false, score = 0, bgX = 0, frame = 0, keys = {};
let currentLevel = 1, isBossFight = false, rainTimer = 0, timeCycle = 0;
let smokeArr = [];
// Variables Joystick
let joyX = 0, joyY = 0;

const characters = [
    { name: 'NEA', img: 'nea.jpg', sign: '♍', color: '#fff', hColor: '#4b2e1e', hStyle: 'bowl' },
    { name: 'ANÍBAL', img: 'anibal.jpg', sign: '♍', color: '#f00', hColor: '#222', hStyle: 'fade' },
    { name: 'MARCOS', img: 'marcos.jpg', sign: '♎', color: '#0f0', hColor: '#000', hStyle: 'spiky' },
    { name: 'SEBA', img: 'seba.jpg', sign: '♍', color: '#00f', hColor: '#5e3a24', hStyle: 'short' },
    { name: 'LEÓN', img: 'leon.jpg', sign: '♈', color: '#ffa500', hColor: '#8b4513', hStyle: 'fade' },
    { name: 'ULISES', img: 'uli.jpg', sign: '♑', color: '#555', hColor: '#111', hStyle: 'fade' },
    { name: 'EZEQUIEL', img: 'ezequiel.jpg', sign: '♏', color: '#4b0082', hColor: '#708090', hStyle: 'spiky' }
];

const player = { name: '', x: 100, y: 400, hp: 100, spd: 7, pwr: 15, atk: false, dir: 1, color: '#fff', sign: '', hairColor: '#222', hairStyle: 'fade' };
const enemy = { name: 'Enemigo', x: 1100, y: 400, hp: 50, spd: 3, type: '$', color: 'gold', hit: 0, hairColor: '#4b2e1e', hairStyle: 'short', dir: -1 };
const stars = Array.from({length: 40}, () => ({x: Math.random()*1000, y: Math.random()*200, sz: Math.random()*2}));
const clouds = Array.from({length: 6}, () => ({x: Math.random()*1000, y: 40 + Math.random()*50, spd: 0.3 + Math.random()*0.4}));
const rainDrops = Array.from({length: 100}, () => ({x: Math.random()*1000, y: Math.random()*500, s: 15 + Math.random()*10}));

// --- LÓGICA DE CLIMA (FUERA DEL LOOP PARA EVITAR CUELGUES) ---
async function updateWeather() {
    const display = document.getElementById('weather-data');
    try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=-34.60&longitude=-58.38&daily=temperature_2m_max,temperature_2m_min&timezone=America%2FArgentina%2FBuenos_Aires&forecast_days=2`);
        const data = await res.json();
        const hoy = `${Math.round(data.daily.temperature_2m_max[0])}°/${Math.round(data.daily.temperature_2m_min[0])}°`;
        const man = `${Math.round(data.daily.temperature_2m_max[1])}°/${Math.round(data.daily.temperature_2m_min[1])}°`;
        display.innerHTML = `HOY: ${hoy}<br>MAÑ: ${man}`;
    } catch (e) {
        display.innerHTML = `HOY: 19°/12°<br>MAÑ: 17°/11°`;
    }
}
updateWeather();

function showSelect() {
    const grid = document.getElementById('grid-container');
    grid.innerHTML = "";
    characters.forEach(c => {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.onclick = () => {
            player.name = c.name; player.color = c.color; player.sign = c.sign;
            player.hairColor = c.hColor; player.hairStyle = c.hStyle;
            document.getElementById('hud-face').src = c.img;
            document.getElementById('hud-name').innerText = c.name + " " + c.sign;
            showNarrative();
        };
        card.innerHTML = `<img src="${c.img}"><div class="sign-tag">${c.name} ${c.sign}</div>`;
        grid.appendChild(card);
    });
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('select-screen').style.display = 'flex';
}

function showNarrative() {
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('narrative-screen').style.display = 'flex';
    const text = `El sol calienta el asfalto de Parque Chacabuco...\nNo hay nada en los bolsillos, pero sobra aguante.\nSalís a la calle a buscar lo que es tuyo,\nesquivando giles y recaudando para la Agencia.\nHoy el barrio se respeta.\n\n(Recauda más de $3000 para enfrentar al Jefe)`;
    let i = 0;
    const div = document.getElementById('narrative-text');
    div.innerHTML = "";
    function type() {
        if (i < text.length) {
            div.innerHTML += text.charAt(i); i++; setTimeout(type, 35);
        } else { document.getElementById('btn-narrative').style.display = 'block'; }
    }
    type();
}

function startGame() {
    document.getElementById('narrative-screen').style.display = 'none';
    document.getElementById('hud').style.visibility = 'visible';
    document.getElementById('weather-report').style.visibility = 'visible';     
    bgMusic.play().catch(() => {});
    active = true; loop();
   
}

function drawSky() {
    timeCycle += 0.002;
    let dayIntensity = (Math.sin(timeCycle) + 1) / 2;
    if (currentLevel === 1) {
        ctx.fillStyle = `rgb(${10 + dayIntensity*40},${15 + dayIntensity*100},${30 + dayIntensity*200})`;
    } else if (currentLevel === 2) {
        ctx.fillStyle = "#1a0505";
    } else {
        ctx.fillStyle = "#050508"; 
    }
    ctx.fillRect(0,0,1000,350);
    if(currentLevel === 1) {
        if(dayIntensity > 0.5) {
            let sAlpha = (dayIntensity - 0.5) * 2;
            ctx.fillStyle = `rgba(255, 255, 0, ${sAlpha})`;
            ctx.beginPath(); ctx.arc(150, 80, 40, 0, Math.PI*2); ctx.fill();
            clouds.forEach(c => {
                c.x += c.spd; if(c.x > 1050) c.x = -100;
                ctx.fillStyle = `rgba(255, 255, 255, ${sAlpha * 0.6})`;
                ctx.beginPath(); ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.arc(c.x+20, c.y-5, 18, 0, Math.PI*2); ctx.arc(c.x+40, c.y, 15, 0, Math.PI*2); ctx.fill();
            });
        }
        if(dayIntensity < 0.5) {
            let nAlpha = (0.5 - dayIntensity) * 2;
            ctx.fillStyle = `rgba(255,255,255,${nAlpha})`;
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.sz, s.sz));
            ctx.fillStyle = `rgba(255, 255, 240, ${nAlpha})`;
            ctx.beginPath(); ctx.arc(850, 70, 25, 0, Math.PI*2); ctx.fill();
        }
    }
    if(rainTimer > 0) {
        ctx.strokeStyle = "rgba(174, 194, 224, 0.6)"; ctx.lineWidth = 1;
        rainDrops.forEach(d => {
            d.y += d.s; if(d.y > 500) { d.y = -20; d.x = Math.random()*1000; }
            ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.s); ctx.stroke();
        });
        rainTimer--;
    }
}

function drawArtemis() {
    if (currentLevel !== 1) return;
    let fixedX = 800; 
    let oscilacion = Math.sin(frame * 0.05) * 10; 
    let ry = 80 + oscilacion; 
    if(frame % 4 === 0) smokeArr.push({x: fixedX, y: ry + 10, r: 4, a: 0.6});
    smokeArr.forEach((p, i) => {
        p.x -= 3; p.a -= 0.01; p.r += 0.2;
        ctx.fillStyle = `rgba(200, 200, 200, ${p.a})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if(p.a <= 0) smokeArr.splice(i, 1);
    });
    ctx.save();
    ctx.fillStyle = "white"; ctx.fillRect(fixedX, ry, 60, 20);
    ctx.fillStyle = "red"; ctx.beginPath(); ctx.moveTo(fixedX + 60, ry); ctx.lineTo(fixedX + 80, ry + 10); ctx.lineTo(fixedX + 60, ry + 20); ctx.fill();
    ctx.fillStyle = "black"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
    ctx.fillText("ARTEMIS 2", fixedX + 30, ry + 14);
    ctx.restore();
}

function drawHuman(x, y, color, isPlayer, hit, type, atk, dir, hairColor, hairStyle) {
    ctx.save(); ctx.translate(x, y);
    const swing = Math.sin(frame * 0.15) * 10;
    ctx.lineWidth = 4; ctx.strokeStyle = "#fff";
    let flip = (dir === -1) ? -1 : 1;
    ctx.beginPath();
    let legLX1 = -10 * flip; let legLX2 = (-15 * flip) - (swing * flip);
    ctx.moveTo(legLX1, -30); ctx.lineTo(legLX2, -5); 
    let legRX1 = 10 * flip; let legRX2 = (15 * flip) + (swing * flip);
    ctx.moveTo(legRX1, -30); ctx.lineTo(legRX2, -5); ctx.stroke();
    ctx.fillStyle = "#fff";
    ctx.fillRect(flip === 1 ? legLX2 : legLX2 - 12, -5, 12, 6);
    ctx.fillRect(flip === 1 ? legRX2 : legRX2 - 12, -5, 12, 6);
    ctx.beginPath();
    if(atk) {
        ctx.moveTo(25 * flip, -75); ctx.lineTo(40 * flip, -115);
        ctx.moveTo(-30 * flip, -75); ctx.lineTo(-45 * flip, -50 + swing);
    } else {
        ctx.moveTo(-30 * flip, -75); ctx.lineTo(-45 * flip, -50 + swing);
        ctx.moveTo(30 * flip, -75); ctx.lineTo(45 * flip, -50 - swing);
    }
    ctx.stroke();
    ctx.fillStyle = hit > 0 ? "white" : color;
    ctx.fillRect(-30, -110, 60, 80);
    if(isPlayer || (currentLevel === 2)) {
        ctx.fillStyle = (color === "#111" || color === "#000" || color === "#4b0082") ? "gold" : "black"; 
        ctx.textAlign = "center"; ctx.font = "bold 10px Arial";
        ctx.fillText(isPlayer ? player.name : enemy.name, 0, -85);
        ctx.font = "bold 16px Arial"; ctx.fillText(isPlayer ? player.sign : type, 0, -65);
    } else {
        ctx.fillStyle = "black"; ctx.font = "bold 25px Impact";
        ctx.textAlign = "center"; ctx.fillText(type, 0, -55);
    }
    ctx.fillStyle = "#ffccaa";
    if(isPlayer) { ctx.fillRect(-20, -140, 40, 30); ctx.strokeRect(-20, -140, 40, 30); }
    else { ctx.beginPath(); ctx.arc(0, -125, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke(); }
    if(hairStyle !== 'none') {
        ctx.fillStyle = hairColor;
        if(hairStyle === 'fade') ctx.fillRect(-20, -150, 40, 15);
        else if(hairStyle === 'short') { ctx.beginPath(); ctx.arc(0, -140, 22, Math.PI, 0); ctx.fill(); }
        else if(hairStyle === 'spiky') { ctx.beginPath(); ctx.moveTo(-20, -140); ctx.lineTo(-10, -155); ctx.lineTo(0, -140); ctx.lineTo(10, -155); ctx.lineTo(20, -140); ctx.fill(); }
        else if(hairStyle === 'bowl') { ctx.fillRect(-22, -145, 44, 12); ctx.fillRect(-22, -145, 10, 20); ctx.fillRect(12, -145, 10, 20); }
    }
    ctx.fillStyle = "black";
    let eyeX = (dir === 1) ? 5 : -15;
    if(hit > 0) { ctx.font = "bold 15px Arial"; ctx.fillText("x x", 0, -125); } 
    else { ctx.fillRect(eyeX, -132, 4, 4); ctx.fillRect(eyeX + 10, -132, 4, 4); ctx.beginPath(); ctx.moveTo(eyeX - 2, -120); ctx.lineTo(eyeX + 12, -120); ctx.stroke(); }
    if(atk) { ctx.fillStyle = "gold"; ctx.fillRect(35 * flip - (flip === -1 ? 18 : 0), -125, 18, 18); }
    ctx.restore();
}

function loop() {
    if(!active) return;
    frame++;
    // MOVIMIENTO INTEGRADO (Teclado + Joystick)
    if(keys['ArrowRight'] || joyX > 0.3) { 
        if(currentLevel !== 2) { if(player.x < 500) player.x += player.spd; else bgX += player.spd; }
        else { if(player.x < 900) player.x += player.spd; }
        player.dir = 1; 
    }
    if(keys['ArrowLeft'] || joyX < -0.3) { if(player.x > 50) player.x -= player.spd; player.dir = -1; }
    if((keys['ArrowUp'] || joyY < -0.3) && player.y > 350) player.y -= 5;
    if((keys['ArrowDown'] || joyY > 0.3) && player.y < 480) player.y += 5;

    let ex = enemy.x - (currentLevel !== 2 ? bgX : 0);
    if(isBossFight || currentLevel === 2) {
        let diffX = ex - player.x;
        if(Math.abs(diffX) > 40) { 
            if(ex > player.x) { enemy.x -= enemy.spd; enemy.dir = -1; } 
            else { enemy.x += enemy.spd; enemy.dir = 1; }
        }
        if(Math.abs(enemy.y - player.y) > 5) { if(enemy.y > player.y) enemy.y -= 2; else enemy.y += 2; }
    } else { 
        if(Math.abs(player.x - ex) < 65 && Math.abs(player.y - enemy.y) < 35) {
            if(Math.random() < 0.05) player.hp -= 1;
        } else { enemy.x -= enemy.spd; enemy.dir = -1; }
    }

    if(enemy.hp <= 0 || (currentLevel !== 2 && ex < -200)) {
        if(enemy.hp <= 0) {
            score += isBossFight ? 3000 : 500;
            if(isBossFight || currentLevel === 2) { active = false; showVictory(); return; }
        }
        if(currentLevel !== 2) {
            enemy.x = bgX + 1100; enemy.hp = 50;
            if(score >= 3000) { isBossFight = true; enemy.hp = 400; enemy.type = "JEFE"; enemy.color = "#333"; enemy.name = "JEFE"; } 
            else {
                let r = Math.random();
                if (r < 0.6) { enemy.type = '$'; enemy.color = 'gold'; }
                else if (r < 0.9) { enemy.type = '₿'; enemy.color = '#f7931a'; }
                else { enemy.type = '💧'; enemy.color = '#00ffff'; }
            }
        }
    }

    ctx.clearRect(0,0,1000,500);
    drawSky();
    drawArtemis();

    if(currentLevel === 1) {
        for(let i=0; i<12; i++) {
            let x = (i * 400) - (bgX * 0.8 % 4800);
            if (i % 4 === 3) {
                ctx.fillStyle = "#222"; ctx.fillRect(x, 50, 398, 300);
                ctx.fillStyle = "#444"; ctx.fillRect(x + 50, 150, 300, 200);
                if(imgSol.complete) ctx.drawImage(imgSol, x + 125, 180, 150, 140);
                ctx.fillStyle = "gold"; ctx.font = "20px Impact"; ctx.textAlign = "center";
                ctx.fillText("CIMA DE DUROS CAMPEONES", x + 200, 130);
            } else {
                ctx.fillStyle = "#3d1a1a"; ctx.fillRect(x, 180, 395, 170);
                ctx.font = "30px Arial"; ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.fillText(i%3==0?"†":i%3==1?"ﷲ":"† ﷲ", x + 50, 220);
                if(flyers[i % 3].complete) ctx.drawImage(flyers[i % 3], x + 140, 200, 110, 100);
                ctx.font = "18px 'Permanent Marker'"; ctx.fillStyle = "lime";
                let loc = ["Subte Medalla Milagrosa E", "Parque Chacabuco", "Lautaro abajo del puente"];
                ctx.textAlign = "center"; ctx.fillText(loc[i%3], x + 200, 330);
            }
        }
        ctx.fillStyle = "#111"; ctx.fillRect(0, 350, 1000, 150);
    } else if (currentLevel === 2) {
        ctx.fillStyle = "#331a00"; ctx.fillRect(0, 350, 1000, 150);
        ctx.strokeStyle = "red"; ctx.lineWidth = 5; ctx.strokeRect(50, 350, 900, 140);
        ctx.fillStyle = "rgba(255,0,0,0.1)"; ctx.fillRect(50, 350, 900, 140);
        
        const pY = 80; const pW = 80; const pH = 90;
        const positions = [250, 460, 670];
        const imgs = [imgFa, imgDo, imgSol];
        positions.forEach((px, idx) => {
            ctx.fillStyle = "#553311"; ctx.fillRect(px - 5, pY - 5, pW + 10, pH + 20);
            ctx.fillStyle = "#fdf5e6"; ctx.fillRect(px, pY, pW, pH);
            if(imgs[idx].complete) ctx.drawImage(imgs[idx], px + 5, pY + 5, pW - 10, pH - 10);
            ctx.strokeStyle = "gold"; ctx.lineWidth = 2; ctx.strokeRect(px - 5, pY - 5, pW + 10, pH + 20);
        });
        ctx.fillStyle = "gold"; ctx.font = "20px 'Permanent Marker'"; ctx.textAlign = "center";
        ctx.fillText("DOJO Cima.PRINCIPIUM", 500, 60);

       } else if (currentLevel === 3) {
        for(let i=0; i<15; i++) {
            let x = (i * 600) - (bgX * 0.9 % 9000);
            let selector = i % 3; // Esto alterna entre los 3 edificios sin romper el loop

            if (selector === 0) {
                // EDIFICIO 1: CASO YANNI / HOSPITAL
                ctx.fillStyle = "#2a2a2a"; ctx.fillRect(x, 50, 500, 300);
                ctx.fillStyle = "white"; ctx.font = "14px 'Special Elite'"; ctx.textAlign = "left";
                ctx.fillText("ASESINARON A NICOLAS YANNI", x + 20, 100);
                ctx.fillStyle = "red"; ctx.fillText("CULPABLE Psicologo PABLO LOPEZ: +54 9 114041-2050", x + 20, 130);
                ctx.fillStyle = "gold"; ctx.fillText("OSDE CORRUPTO", x + 20, 160);
                ctx.strokeStyle = "#444"; ctx.strokeRect(x+350, 80, 100, 200); 
            } else if (selector === 1) {
                // EDIFICIO 2: LA WARHOL
                ctx.fillStyle = "#111"; ctx.fillRect(x, 50, 500, 300);
                ctx.fillStyle = "#ff00ff"; ctx.font = "40px 'Permanent Marker'"; ctx.textAlign = "center";
                ctx.fillText("LA WARHOL", x + 250, 120);
                ctx.strokeStyle = "cyan"; ctx.strokeRect(x+50, 50, 400, 300);
                const bx = x + 230; const by = 150;
                const flagCols = ["#E40303", "#FF8C00", "#FFED00", "#008026", "#004DFF", "#750787"];
                flagCols.forEach((c, idx) => { ctx.fillStyle = c; ctx.fillRect(bx, by + (idx * 4), 30, 4); });
                ctx.fillStyle = "#555"; ctx.fillRect(bx - 2, by, 2, 24);
            } else {
                // EDIFICIO 3: PODER JUDICIAL (EL QUE AGREGAMOS)
                ctx.fillStyle = "#151515"; ctx.fillRect(x, 50, 500, 300);
                ctx.strokeStyle = "gold"; ctx.lineWidth = 2; ctx.strokeRect(x+10, 50, 480, 300);
                ctx.fillStyle = "white"; ctx.font = "bold 24px Impact"; ctx.textAlign = "center";
                ctx.fillText("PODER JUDICIAL", x + 250, 100);
                ctx.fillStyle = "red"; ctx.font = "18px 'Special Elite'";
                ctx.fillText("CORRUPTOS CHORROS", x + 250, 140);
                ctx.fillText("ALQUILER DE JUECES Y FISCALES", x + 250, 180);
                // Detalle de rejas o columnas
                ctx.fillStyle = "#333";
                for(let r=0; r<8; r++) ctx.fillRect(x + 40 + (r*60), 210, 5, 140);
            }
        }
        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, 350, 1000, 150);
    
    }

    drawHuman(ex, enemy.y, enemy.color, false, enemy.hit, enemy.type, false, enemy.dir, enemy.hairColor, hairStyle = enemy.hairStyle);
    drawHuman(player.x, player.y, player.color, true, 0, '', player.atk, player.dir, player.hairColor, player.hairStyle);
    document.getElementById('hp-fill').style.width = player.hp + "%";
    document.getElementById('score-text').innerText = "$" + score;
    if(player.hp <= 0) location.reload();
    if(enemy.hit > 0) enemy.hit--;
    requestAnimationFrame(loop);
}

function showVictory() {
    const screen = document.getElementById('victory-screen');
    const title = document.getElementById('victory-title');
    const msg = document.getElementById('victory-msg');
    const btn = document.getElementById('btn-victory');
    const cbuCont = document.getElementById('cbu-container');
    
    screen.style.display = 'flex';
    document.getElementById('final-score').innerText = score;
    
    if(currentLevel === 1) {
        title.innerText = "¡BARRIO DOMINADO!";
        msg.innerText = "Limpiaste el barrio. Los pesos pesados te esperan en el Club de Pelea.";
        btn.innerText = "IR AL CLUB DE PELEA";
        cbuCont.style.display = 'none';
    } else if(currentLevel === 2) {
        title.innerText = "¡CAMPEÓN DEL CLUB!";
        msg.innerText = "Derrotaste al mejor. Pero hay deudas de sangre. Alguien te espera frente al psiquiátrico.";
        btn.innerText = "IR AL HOSPITAL";
        cbuCont.style.display = 'none';
    } else {
        title.innerText = "JUSTICIA ALCANZADA";
        msg.innerText = "Has expuesto la verdad rellena el formulario de google para cobrar. La Agencia te compensará por el trabajo.";
        btn.innerText = "ENVIAR Y FINALIZAR";
        cbuCont.style.display = 'flex';
    }
}

function nextStep() {
    if(currentLevel === 1) prepareLevel2();
    else if(currentLevel === 2) prepareLevel3();
    else {
        const cbuValue = document.getElementById('cbu-field').value;
        if(cbuValue.length < 22) {
            alert("El CBU debe tener 22 dígitos para procesar el pago.");
        } else {
            alert("CBU " + cbuValue + " recibido. Redirigiendo al formulario de registro...");
            window.open("https://docs.google.com/forms/d/e/1FAIpQLSfi4V06az0DjGQTyOzfNFNTCARQOTYo2qymWMFZN7V15rFd4A/viewform?usp=header", "_blank");
            location.reload();
        }
    }
}

function prepareLevel2() {
    document.getElementById('victory-screen').style.display = 'none';
    currentLevel = 2; isBossFight = false;
    const opList = characters.filter(c => c.name !== player.name);
    const op = opList[Math.floor(Math.random() * opList.length)];
    enemy.name = op.name; enemy.color = op.color; enemy.hairColor = op.hColor; enemy.hairStyle = op.hStyle;
    enemy.hp = 250; enemy.type = op.sign; enemy.x = 800; enemy.y = 400; enemy.dir = -1;
    player.x = 200; player.hp = 100; active = true; loop();
}

function prepareLevel3() {
    document.getElementById('victory-screen').style.display = 'none';
    currentLevel = 3; isBossFight = false; bgX = 0;
    enemy.hp = 80; enemy.type = '$'; enemy.color = 'gold'; enemy.x = 1100;
    player.x = 100; player.hp = 100; score = 0; active = true; loop();
}

function executeAttack() {
    if(!active || player.atk) return;
    player.atk = true;
    let ex = enemy.x - (currentLevel !== 2 ? bgX : 0);
    if(Math.abs(player.x - ex) < 100 && Math.abs(player.y - enemy.y) < 55) { 
        enemy.hp -= player.pwr; enemy.hit = 10; if(enemy.type === '💧') rainTimer = 150;
    }
    setTimeout(() => player.atk = false, 150);
}

// LOGICA JOYSTICK
const stick = document.getElementById('joystick-stick');
const base = document.getElementById('joystick-base');
const handleJoy = (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = base.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let dx = touch.clientX - centerX;
    let dy = touch.clientY - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 40;
    if (dist > maxDist) { dx *= maxDist / dist; dy *= maxDist / dist; }
    stick.style.transform = `translate(${dx}px, ${dy}px)`;
    joyX = dx / maxDist; joyY = dy / maxDist;
};
base.addEventListener('touchstart', handleJoy);
base.addEventListener('touchmove', handleJoy);
base.addEventListener('touchend', () => { stick.style.transform = `translate(0px, 0px)`; joyX = 0; joyY = 0; });
document.getElementById('mAtk').addEventListener('touchstart', (e) => { e.preventDefault(); executeAttack(); });

window.onkeydown = (e) => {
    if(document.activeElement.tagName === 'INPUT') return; 
    keys[e.key] = true;
    if(e.key.toLowerCase() === 'z') executeAttack();
};
window.onkeyup = (e) => keys[e.key] = false;
</script>
